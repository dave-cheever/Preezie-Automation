name: API Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  repository_dispatch:
    types: [run-google-sheet-test]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_EMAIL: ${{ secrets.FIREBASE_EMAIL }}
      FIREBASE_PASSWORD: ${{ secrets.FIREBASE_PASSWORD }}
      CMS_BASE_URL: ${{ secrets.CMS_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 and cache Maven
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        id: run_tests
        run: mvn -B -V -e -DskipTests=false test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports

      - name: Update Google Sheet on success
        if: success() && github.event_name == 'repository_dispatch'
        run: |
          curl -X POST "${{ secrets.APPS_SCRIPT_WEBAPP_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "spreadsheetId": "${{ github.event.client_payload.spreadsheetId }}",
              "sheetName": "${{ github.event.client_payload.sheetName }}",
              "runCell": "${{ github.event.client_payload.runCell }}",
              "statusCell": "${{ github.event.client_payload.statusCell }}",
              "lastRunCell": "${{ github.event.client_payload.lastRunCell }}",
              "messageCell": "${{ github.event.client_payload.messageCell }}",
              "status": "PASSED",
              "message": "Automation test completed successfully."
            }'

      - name: Update Google Sheet on failure
        if: failure() && github.event_name == 'repository_dispatch'
        run: |
          curl -X POST "${{ secrets.APPS_SCRIPT_WEBAPP_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "spreadsheetId": "${{ github.event.client_payload.spreadsheetId }}",
              "sheetName": "${{ github.event.client_payload.sheetName }}",
              "runCell": "${{ github.event.client_payload.runCell }}",
              "statusCell": "${{ github.event.client_payload.statusCell }}",
              "lastRunCell": "${{ github.event.client_payload.lastRunCell }}",
              "messageCell": "${{ github.event.client_payload.messageCell }}",
              "status": "FAILED",
              "message": "Automation test failed."
            }'